apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-frontend
  namespace: multica
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multica-frontend
  template:
    metadata:
      labels:
        app: multica-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/multica-ai/multica-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: multica-app-config
                  key: NEXT_PUBLIC_API_URL
            - name: NEXT_PUBLIC_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: multica-app-config
                  key: NEXT_PUBLIC_WS_URL
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: multica-frontend
  namespace: multica
spec:
  selector:
    app: multica-frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000

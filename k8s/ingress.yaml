apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica
  namespace: multica
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/websocket-services: multica-backend
spec:
  tls:
    - hosts:
        - app.example.com
        - api.example.com
      secretName: multica-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-frontend
                port:
                  number: 3000
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080

apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-backend
  namespace: multica
spec:
  replicas: 2
  selector:
    matchLabels:
      app: multica-backend
  template:
    metadata:
      labels:
        app: multica-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/multica-ai/multica-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: multica-app-secret
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: multica-app-secret
                  key: JWT_SECRET
            - name: FRONTEND_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: multica-app-config
                  key: FRONTEND_ORIGIN
            - name: CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: multica-app-config
                  key: CORS_ALLOWED_ORIGINS
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: multica-app-secret
                  key: RESEND_API_KEY
                  optional: true
            - name: RESEND_FROM_EMAIL
              valueFrom:
                configMapKeyRef:
                  name: multica-app-config
                  key: RESEND_FROM_EMAIL
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: multica-backend
  namespace: multica
spec:
  selector:
    app: multica-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080

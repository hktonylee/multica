apiVersion: v1
kind: ConfigMap
metadata:
  name: multica-app-config
  namespace: multica
data:
  FRONTEND_ORIGIN: "https://app.example.com"
  CORS_ALLOWED_ORIGINS: "https://app.example.com"
  RESEND_FROM_EMAIL: "noreply@example.com"
  NEXT_PUBLIC_API_URL: "https://api.example.com"
  NEXT_PUBLIC_WS_URL: "wss://api.example.com/ws"
---
apiVersion: v1
kind: Secret
metadata:
  name: multica-postgres-secret
  namespace: multica
type: Opaque
stringData:
  POSTGRES_DB: "multica"
  POSTGRES_USER: "multica"
  POSTGRES_PASSWORD: "change-me"
---
apiVersion: v1
kind: Secret
metadata:
  name: multica-app-secret
  namespace: multica
type: Opaque
stringData:
  DATABASE_URL: "postgres://multica:change-me@multica-postgres:5432/multica?sslmode=disable"
  JWT_SECRET: "replace-with-openssl-rand-hex-32"
  RESEND_API_KEY: ""

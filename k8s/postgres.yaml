apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-postgres
  namespace: multica
spec:
  replicas: 1
  selector:
    matchLabels:
      app: multica-postgres
  template:
    metadata:
      labels:
        app: multica-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: multica-postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: multica-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multica-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: multica-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: multica-postgres
  namespace: multica
spec:
  selector:
    app: multica-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
